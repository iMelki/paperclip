# Canonical label manifest for the AI Agent Task Management OS.
# GitHub Projects fields remain authoritative for workflow state, but labels
# provide repo-local filtering and automation hooks during rollout.

- name: "status:inbox"
  color: "ededed"
  description: "Newly captured work that still needs triage."
- name: "status:grooming"
  color: "d4c5f9"
  description: "Work being clarified, scoped, or decomposed."
- name: "status:ready"
  color: "0e8a16"
  description: "Ready for assignment or dispatch."
- name: "status:assigned"
  color: "1d76db"
  description: "Assigned to a human or agent."
- name: "status:in-progress"
  color: "fbca04"
  description: "Actively being worked."
- name: "status:review"
  color: "c2e0c6"
  description: "Awaiting review, validation, or merge decision."
- name: "status:blocked"
  color: "b60205"
  description: "Blocked by a dependency, decision, or missing access."
- name: "status:done"
  color: "5319e7"
  description: "Completed and verified."

- name: "agent:allowed"
  color: "bfdadc"
  description: "An agent may work on this within the documented scope."
- name: "agent:not-safe"
  color: "d93f0b"
  description: "Do not dispatch to an agent without explicit approval."
- name: "agent:codex"
  color: "0052cc"
  description: "Candidate or active task for Codex."
- name: "agent:copilot"
  color: "0366d6"
  description: "Candidate or active task for Copilot."
- name: "agent:openclaw"
  color: "0b7285"
  description: "Candidate or active task for OpenClaw."
- name: "agent:hermes"
  color: "6f42c1"
  description: "Candidate or active task for Hermes."
- name: "agent:review-required"
  color: "e99695"
  description: "Agent output requires human review."

- name: "risk:low"
  color: "0e8a16"
  description: "Low-risk docs, tests, isolated UI, or non-critical scripts."
- name: "risk:medium"
  color: "fbca04"
  description: "Normal code or workflow change requiring human review."
- name: "risk:high"
  color: "d93f0b"
  description: "High-impact infra, auth, secrets, production, or multi-repo work."
- name: "risk:critical"
  color: "b60205"
  description: "Money, trading, credentials, destructive ops, or other critical work."

- name: "type:feature"
  color: "a2eeef"
  description: "New functionality or capability."
- name: "type:bug"
  color: "d73a4a"
  description: "Defect or regression."
- name: "type:docs"
  color: "0075ca"
  description: "Documentation change."
- name: "type:refactor"
  color: "c5def5"
  description: "Internal restructuring without intended behavior change."
- name: "type:infra"
  color: "5319e7"
  description: "Infrastructure, deployment, or environment work."
- name: "type:research"
  color: "7057ff"
  description: "Investigation, spike, or decision support."
- name: "type:test"
  color: "bfe5bf"
  description: "Testing, QA, or verification work."
- name: "type:automation"
  color: "fef2c0"
  description: "Workflow, bot, or scheduled automation work."

- name: "area:frontend"
  color: "f9d0c4"
  description: "Frontend or UI surface."
- name: "area:backend"
  color: "c2e0c6"
  description: "Backend service or API surface."
- name: "area:infra"
  color: "bfd4f2"
  description: "Infrastructure, hosting, CI, or environments."
- name: "area:docs"
  color: "0075ca"
  description: "Documentation, guides, or specifications."
- name: "area:agent"
  color: "d4c5f9"
  description: "Agent configuration, orchestration, prompts, or skills."
- name: "area:security"
  color: "b60205"
  description: "Security, secrets, permissions, or policy."
- name: "area:observability"
  color: "fef2c0"
  description: "Logging, metrics, tracing, alerts, or reporting."
- name: "area:workflow"
  color: "cfd3d7"
  description: "Process, governance, intake, or review workflow."

- name: "priority:p0"
  color: "b60205"
  description: "Critical priority."
- name: "priority:p1"
  color: "d93f0b"
